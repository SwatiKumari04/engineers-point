name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server-tests:
    name: Server tests (incl. flash-sale concurrency)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test --workspace server

  client-checks:
    name: Client lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace client
      - run: npm run build --workspace client
